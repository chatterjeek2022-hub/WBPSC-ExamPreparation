<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBPSC Prep</title>
<link rel="apple-touch-icon" href="wbpscprep.png">
<link rel="icon" type="image/png" href="wbpscprep.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(to bottom right,#eff6ff,#dbeafe);}
.card{background:white;border-radius:24px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
</style>
</head>
<body class="p-5">
<div class="max-w-7xl mx-auto">
<div class="card mb-6 flex items-center gap-4">
<img src="wbpscprep.png" class="w-20 h-20 rounded-2xl object-cover">
<div>
<h1 class="text-4xl font-bold text-blue-900">📘 WBPSC Prep</h1>
<p class="text-gray-600 mt-2">Personal Bengali WBPSC Preparation Ecosystem</p>
</div>
</div>

<div class="grid lg:grid-cols-2 gap-6">

<div class="card">
<h2 class="text-2xl font-bold text-blue-900 mb-4">📚 Study Materials</h2>

<textarea id="notes" class="w-full border rounded-xl p-3 h-64">
বাংলার নবজাগরণ:
• রাজা রামমোহন রায় সমাজ সংস্কার আন্দোলনের পথিকৃৎ।
• সতীদাহ প্রথা বিলোপে গুরুত্বপূর্ণ ভূমিকা।
• ব্রাহ্ম সমাজ প্রতিষ্ঠা করেন।
</textarea>

<button onclick="downloadPDF()" class="mt-4 bg-blue-700 text-white px-5 py-3 rounded-xl w-full font-bold">
Download PDF
</button>
</div>

<div class="card">
<h2 class="text-2xl font-bold text-green-900 mb-4">📝 Mock Test</h2>

<div id="quizArea">
<div class="font-bold text-lg mb-3">
১. সতীদাহ প্রথা বিলোপ কে করেন?
</div>

<label class="block mb-2"><input type="radio" name="q1" value="0"> বিদ্যাসাগর</label>
<label class="block mb-2"><input type="radio" name="q1" value="1"> রাজা রামমোহন রায়</label>
<label class="block mb-2"><input type="radio" name="q1" value="0"> রবীন্দ্রনাথ ঠাকুর</label>
<label class="block mb-2"><input type="radio" name="q1" value="0"> বঙ্কিমচন্দ্র</label>

<button onclick="submitQuiz()" class="mt-5 bg-green-700 text-white px-5 py-3 rounded-xl w-full font-bold">
Submit Test
</button>
</div>

<div id="resultArea" class="hidden mt-5">
<div id="score" class="text-2xl font-bold text-blue-900 mb-3"></div>

<div class="bg-blue-50 border border-blue-200 rounded-xl p-4">
রাজা রামমোহন রায় সতীদাহ প্রথা বিলোপে গুরুত্বপূর্ণ ভূমিকা পালন করেন।
</div>

<button onclick="downloadSolutionPDF()" class="mt-5 bg-purple-700 text-white px-5 py-3 rounded-xl w-full font-bold">
Download Solution PDF
</button>
</div>
</div>
</div>
</div>

<script>
function submitQuiz(){
let score = 0;
const ans = document.querySelector('input[name="q1"]:checked');
if(ans && ans.value === "1"){score += 1;} else {score -= 0.33;}
document.getElementById('quizArea').style.display='none';
document.getElementById('resultArea').classList.remove('hidden');
document.getElementById('score').innerText="Score: "+score.toFixed(2)+" / 1";
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text(document.getElementById('notes').value,10,20);
doc.save("wbpsc-study-material.pdf");
}

function downloadSolutionPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("WBPSC Mock Test Solution",10,20);
doc.text("Correct Answer: Raja Rammohan Roy",10,40);
doc.save("wbpsc-mock-solution.pdf");
}
</script>

</body>
</html>
