<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBPSC Prep Ultimate Offline</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="wbpscprep.png">
<link rel="apple-touch-icon" href="wbpscprep.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="main-container">

<header class="hero-card">
<div>
<h1>📘 WBPSC Prep Ultimate</h1>
<p>Complete Bengali Offline WBPSC Preparation Ecosystem</p>
</div>
</header>

<section class="dashboard-grid">

<div class="dashboard-card purple">
<h2>8</h2>
<p>Subjects</p>
</div>

<div class="dashboard-card blue">
<h2>25+</h2>
<p>Mock Questions</p>
</div>

<div class="dashboard-card green">
<h2>Offline</h2>
<p>Mode Active</p>
</div>

<div class="dashboard-card orange">
<h2>PDF</h2>
<p>Downloads</p>
</div>

</section>

<section class="section-card">

<h2>📚 Study Materials</h2>

<select id="subjectSelect">
<option value="history">ইতিহাস</option>
<option value="geography">ভূগোল</option>
<option value="constitution">সংবিধান</option>
<option value="economics">অর্থনীতি</option>
<option value="science">বিজ্ঞান</option>
<option value="math">অঙ্ক</option>
<option value="gk">জেনারেল নলেজ</option>
<option value="polity">রাষ্ট্রবিজ্ঞান</option>
</select>

<textarea id="studyContent"></textarea>

<div class="button-row">
<button onclick="loadSubject()">Load Subject</button>
<button onclick="downloadStudyPDF()">Download PDF</button>
</div>

</section>

<section class="section-card">

<h2>📰 Current Affairs</h2>

<div id="currentAffairs"></div>

</section>

<section class="section-card">

<h2>📝 WBPSC Mock Test</h2>

<div id="quizBox"></div>

<div class="button-row">
<button onclick="submitQuiz()">Submit Mock Test</button>
<button onclick="downloadSolutionPDF()">Download Solution PDF</button>
</div>

<div id="result"></div>

</section>

<section class="section-card">

<h2>📈 Previous Results</h2>

<div id="historyBox"></div>

</section>

</div>

<script src="subjects.js"></script>
<script src="quiz.js"></script>
<script src="pdf.js"></script>
<script src="storage.js"></script>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

loadSubject();
loadQuiz();
loadCurrentAffairs();
loadHistory();

</script>

</body>
</html>
